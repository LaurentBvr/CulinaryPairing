<nav class="navbar">
  <div class="navbar-brand">
    <a routerLink="/dashboard">🍷 CulinaryPairing</a>
  </div>
  <div class="navbar-menu">
    <a routerLink="/recettes" routerLinkActive="active">Recettes</a>
    <a routerLink="/boissons" routerLinkActive="active">Boissons</a>
    <a routerLink="/vide-frigo" routerLinkActive="active">Vide-frigo</a>
    @if (auth.currentUser$ | async) {
      <a routerLink="/mes-favoris" routerLinkActive="active">Mes favoris</a>
      <a routerLink="/profile" routerLinkActive="active">Mon profil</a>
    }
  </div>
  <div class="navbar-user">
    @if (auth.currentUser$ | async; as user) {
      <span class="user-name">{{ user.prenom }} {{ user.nom }}</span>
      <button (click)="auth.logout()">Déconnexion</button>
    }
  </div>
</nav>
