<div class="vide-frigo">
  <h2>🧊 Vide-frigo</h2>

  <div class="search-bar">
    <input
      type="text"
      placeholder="Ajouter un ingrédient..."
      [value]="searchQuery"
      (input)="onSearch($event)"
    />
    <ul class="suggestions" *ngIf="suggestions.length > 0">
      <li *ngFor="let s of suggestions" (click)="addIngredient(s)">{{ s.nom }}</li>
    </ul>
  </div>

  <div class="chips">
    <div class="chip-wrapper" *ngFor="let i of selected">
      <span class="chip">
        {{ i.nom }} <button (click)="removeIngredient(i)">×</button>
      </span>
      <small class="chip-info" *ngIf="i.info">{{ formatInfo(i.info) }}</small>
    </div>
  </div>

  <div class="options">
    <label>Nombre de recettes à afficher :
      <select [(ngModel)]="nombreResultats">
        <option [value]="5">5</option>
        <option [value]="10">10</option>
        <option [value]="15">15</option>
        <option [value]="20">20</option>
      </select>
    </label>
    <label>
      <input type="checkbox" [(ngModel)]="inclureVeg" /> Inclure versions végé/végan
    </label>
    <button (click)="rechercher()" [disabled]="selected.length === 0">Rechercher</button>
    <button (click)="reset()">Réinitialiser</button>
  </div>

  <p class="error" *ngIf="error">{{ error }}</p>

  <div class="results" *ngIf="results.length > 0">
    <div class="result-card" *ngFor="let r of results" [routerLink]="['/recettes', r.recetteId]">
      <div class="result-header">
        <span class="titre">{{ r.titre }}</span>
        <span class="score">{{ r.score }}%</span>
        <span class="badge-veg" *ngIf="r.badgeVeg">🌿 Version végé possible</span>
      </div>
      <div class="manquants" *ngIf="r.ingredientsManquants.length > 0">
        Manquants : {{ r.ingredientsManquants.join(', ') }}
      </div>
    </div>
  </div>

  <p *ngIf="searched && results.length === 0 && !error">
    Aucune recette possible. Essayez d'ajouter des ingrédients de base.
  </p>
</div>
