<div class="register-container">
  <h2>Inscription</h2>
  <form [formGroup]="form" (ngSubmit)="submit()">
    <div>
      <label>Nom</label>
      <input type="text" formControlName="nom" />
      <span *ngIf="form.get('nom')?.invalid && form.get('nom')?.touched">
        Nom requis
      </span>
    </div>
    <div>
      <label>Email</label>
      <input type="email" formControlName="email" />
      <span *ngIf="form.get('email')?.invalid && form.get('email')?.touched">
        Email invalide
      </span>
    </div>
    <div>
      <label>Mot de passe</label>
      <input type="password" formControlName="password" />
      <span *ngIf="form.get('password')?.invalid && form.get('password')?.touched">
        Minimum 8 caractères
      </span>
    </div>
    <p *ngIf="error" class="error">{{ error }}</p>
    <button type="submit" [disabled]="loading">
      {{ loading ? 'Inscription...' : 'S\'inscrire' }}
    </button>
    <p>Déjà un compte ? <a routerLink="/login">Se connecter</a></p>
  </form>
</div>
